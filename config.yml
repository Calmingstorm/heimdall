discord:
  token: "${DISCORD_TOKEN}"
  allowed_users: []  # Discord user IDs that can interact with the bot (empty = allow all)
  channels: []  # Channel IDs the bot responds in (empty = all channels)

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 16384
  daily_budget_tokens: 0

openai_codex:
  enabled: true
  model: "gpt-5.3-codex"
  max_tokens: 4096
  credentials_path: "./data/codex_auth.json"

context:
  directory: "./data/context"
  max_system_prompt_tokens: 32000

sessions:
  max_history: 50
  max_age_hours: 24
  persist_directory: "./data/sessions"

tools:
  enabled: true
  ssh_key_path: "/app/.ssh/id_ed25519"
  ssh_known_hosts_path: "/app/.ssh/known_hosts"
  hosts: {}
  # Example host config:
  #   myhost:
  #     address: "10.0.0.1"
  #     ssh_user: "root"
  #   myserver:
  #     address: "10.0.0.2"
  #     ssh_user: "deploy"
  #     os: "linux"
  allowed_services: []
  # Example services:
  #   - nginx
  #   - postgresql
  #   - docker
  #   - prometheus
  allowed_playbooks: []
  # Example playbooks:
  #   - check-services.yml
  #   - system-info.yml
  ansible_directory: "/ansible"
  approval_timeout_seconds: 120
  command_timeout_seconds: 30
  # prometheus_host: "myserver"   # Host alias to run Prometheus queries on
  # ansible_host: "myhost"       # Host alias to run Ansible playbooks from
  # claude_code_host: "myhost"   # Default host for claude -p
  # claude_code_user: ""         # Non-root user for claude -p edits (e.g. "deploy")
  # claude_code_dir: "/opt/project"  # Default working directory for claude -p
  # incus_host: "myhost"         # Host alias where Incus runs

webhook:
  enabled: false
  secret: "${WEBHOOK_SECRET}"
  channel_id: ""        # Default channel for webhook notifications
  gitea_channel_id: ""  # Channel for Gitea webhooks (falls back to channel_id)
  grafana_channel_id: "" # Channel for Grafana alerts (falls back to channel_id)

learning:
  enabled: true
  max_entries: 30
  consolidation_target: 20

search:
  enabled: true
  ollama_url: "http://host.docker.internal:11434"
  embed_model: "nomic-embed-text"
  chromadb_path: "./data/chromadb"

logging:
  level: "INFO"
  directory: "./data/logs"

usage:
  directory: "./data/usage"

voice:
  enabled: false
  voice_service_url: "ws://loki-voice:3940/ws"
  auto_join: false
  transcript_channel_id: ""
  default_voice: "en-US-AvaMultilingualNeural"
  wake_word: "loki"

browser:
  enabled: false
  cdp_url: "ws://loki-browser:3000?token=loki-internal"
