timezone: "UTC"  # IANA timezone (e.g. "America/New_York", "Europe/London", "Asia/Tokyo")

discord:
  token: "${DISCORD_TOKEN}"
  allowed_users: []  # Discord user IDs that can interact with the bot (empty = allow all)
  channels: []  # Channel IDs the bot responds in (empty = all channels)
  respond_to_bots: false  # Whether to respond to messages from other bots/webhooks
  require_mention: false  # Only respond when the bot is @mentioned

openai_codex:
  enabled: true
  model: "gpt-5.4"
  max_tokens: 4096
  credentials_path: "./data/codex_auth.json"

context:
  directory: "./data/context"
  max_system_prompt_tokens: 32000

sessions:
  max_history: 50
  max_age_hours: 24
  persist_directory: "./data/sessions"

tools:
  enabled: true
  ssh_key_path: "~/.ssh/id_ed25519"       # Docker: mount ssh/ to /home/heimdall/.ssh via docker-compose
  ssh_known_hosts_path: "~/.ssh/known_hosts"
  hosts: {}
  # Example host config:
  #   myhost:
  #     address: "10.0.0.1"
  #     ssh_user: "root"
  #   myserver:
  #     address: "10.0.0.2"
  #     ssh_user: "deploy"
  #     os: "linux"
  command_timeout_seconds: 300
  # Max tool-calling iterations per request before the loop force-exits.
  # Chat: normal Discord messages. Loop: autonomous loop iterations.
  # Loops need more budget (exploration + execution + verification + commit).
  max_tool_iterations_chat: 30
  max_tool_iterations_loop: 100
  # claude_code_host: "myhost"   # Default host for claude -p (omit to disable claude_code tool)
  # claude_code_user: ""         # Non-root user for claude -p edits (e.g. "deploy")
  # claude_code_dir: "/opt/project"  # Default working directory for claude -p

webhook:
  enabled: false
  secret: "${WEBHOOK_SECRET:-}"
  channel_id: ""        # Default channel for webhook notifications
  gitea_channel_id: ""  # Channel for Gitea webhooks (falls back to channel_id)
  grafana_channel_id: "" # Channel for Grafana alerts (falls back to channel_id)

learning:
  enabled: true
  max_entries: 30
  consolidation_target: 20

search:
  enabled: true
  search_db_path: "./data/search"

logging:
  level: "INFO"
  directory: "./data/logs"

usage:
  directory: "./data/usage"

voice:
  enabled: false
  voice_service_url: "ws://heimdall-voice:3940/ws"
  auto_join: false
  transcript_channel_id: ""
  default_voice: "en_US-lessac-medium"
  wake_word: "heimdall"

browser:
  enabled: false
  cdp_url: "ws://heimdall-browser:3000?token=${BROWSER_TOKEN:-heimdall-internal}"

monitoring:
  enabled: false
  checks: []
  alert_channel_id: ""
  cooldown_minutes: 60

permissions:
  tiers: {}
  default_tier: "user"
  overrides_path: "./data/permissions.json"

comfyui:
  enabled: false
  url: "http://localhost:8188"

web:
  enabled: true
  port: 3000  # Health check + web UI port. Docker maps this to 3939 on the host.
  api_token: ""  # Empty = no auth (dev mode). Set a secret token for production.
