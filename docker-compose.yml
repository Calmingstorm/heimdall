services:
  heimdall-bot:
    build: .
    container_name: heimdall-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
      - ./data/context:/app/data/context:ro
      - ./ssh:/home/heimdall/.ssh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3939:3000"

  heimdall-browser:
    image: ghcr.io/browserless/chromium
    container_name: heimdall-browser
    restart: unless-stopped
    profiles:
      - browser
    environment:
      - CONCURRENT=2
      - TIMEOUT=30000
      - QUEUED=5
      - HEALTH=true
      - TOKEN=${BROWSER_TOKEN:-heimdall-internal}
    deploy:
      resources:
        limits:
          memory: 1g

  heimdall-voice:
    build: ./voice-service
    container_name: heimdall-voice
    restart: unless-stopped
    profiles:
      - voice
    volumes:
      - ./voice-service/config.yml:/app/config.yml:ro
      - ./voice-service/voices:/app/voices
      - ./voice-service/models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
